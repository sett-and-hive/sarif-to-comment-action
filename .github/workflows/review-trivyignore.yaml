# A workflow that periodically reviews .trivyignore entries for available patches

name: Review .trivyignore

on:
  schedule:
    # Run every Wednesday at 10:00 AM Chicago time (4:00 PM UTC, accounting for CST UTC-6)
    - cron: '0 16 * * 3'
  workflow_dispatch:
    inputs:
      trivyignore_path:
        description: 'Path to .trivyignore file'
        required: false
        default: '.trivyignore'
        type: string

permissions:
  contents: read
  issues: write

jobs:
  review-trivyignore:
    runs-on: ubuntu-latest
    name: Review ignored vulnerabilities

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Review .trivyignore entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TRIVYIGNORE_PATH: ${{ inputs.trivyignore_path || '.trivyignore' }}
        run: |
          python .github/scripts/review_trivyignore.py

      - name: Publish summary
        if: always()
        run: |
          {
            echo "### 🔄 .trivyignore Review Completed"
            echo ""
            echo "The review of vulnerabilities in \`.trivyignore\` has been completed."
            echo "Check the tracking issue for detailed findings."
          } >> "$GITHUB_STEP_SUMMARY"
